<!DOCTYPE html>
<html>
<head>
<title>Video Call</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body style="background:#000;color:white;text-align:center;padding-top:150px;">

<h2>📹 Video Calling {{ username }}</h2>

<video
id="localVideo"
autoplay
muted
playsinline
style="
width:220px;
height:300px;
border-radius:15px;
background:#222;
object-fit:cover;">
</video>

<br><br>

<video
id="remoteVideo"
autoplay
playsinline
style="
width:220px;
height:300px;
border-radius:15px;
background:#222;
object-fit:cover;">
</video>


<p>Connecting...</p>

<script>

const socket = io();

const room =
["{{ session['username'] }}","{{ username }}"]
.sort()
.join("_");

let pc;

const configuration = {
iceServers:[
{
urls:[
"stun:stun.l.google.com:19302"
]
}
]
};

pc = new RTCPeerConnection(configuration);
socket.emit("join",{

    room:room,

    username:"{{ session['username'] }}"

});


// 👇 YAHAN SE ADD KARO

navigator.mediaDevices
.getUserMedia({
audio:true,
video:true
})
.then(stream=>{

window.localStream = stream;

document.getElementById("localVideo").srcObject = stream;


stream.getTracks().forEach(track=>{
pc.addTrack(track,stream);
});

});

socket.on("joined", async ()=>{

    if(room.includes("{{ session['username'] }}")){

        const offer = await pc.createOffer();

        await pc.setLocalDescription(offer);

        socket.emit("offer",{
            room:room,
            offer:offer
        });

    }

});

socket.on("offer", async data=>{

    await pc.setRemoteDescription(
        new RTCSessionDescription(data.offer)
    );

    const answer = await pc.createAnswer();

    await pc.setLocalDescription(answer);

    socket.emit("answer",{
        room:room,
        answer:answer
    });

});

socket.on("answer", async data=>{

    await pc.setRemoteDescription(
        new RTCSessionDescription(data.answer)
    );

});

socket.on("ice_candidate", async data=>{

    if(data.candidate){

        try{

            await pc.addIceCandidate(
                new RTCIceCandidate(data.candidate)
            );

        }catch(e){

            console.log(e);

        }

    }

});

pc.onicecandidate = event=>{

    if(event.candidate){

        socket.emit("ice_candidate",{

            room:room,

            candidate:event.candidate

        });

    }

};

pc.ontrack = event=>{

    document.getElementById("remoteVideo").srcObject =
        event.streams[0];

};


function startVideoCall(){

    socket.emit("call_user",{

        caller:"{{ session['username'] }}",

        receiver:"{{ chat_with }}",

        room:[
            "{{ session['username'] }}",
            "{{ chat_with }}"
        ].sort().join("_"),

        type:"video"

    });

    window.location="/video_call/{{ chat_with }}";

}

</script>

</body>
</html>
