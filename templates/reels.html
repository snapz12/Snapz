<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snapz Reels</title><style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
}

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#000;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid #222;
    z-index:100;
}

.reel{
    position:relative;
    width:100%;
    max-width:500px;
    height:85vh;
    margin:0 auto 15px auto;
    overflow:hidden;
    border-radius:12px;
}

.reel video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}


.info{
    position:absolute;
    left:15px;
    bottom:20px;
    z-index:10;
}

.actions{
    position:absolute;
    right:10px;
    bottom:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    z-index:10;
}

.username{
    font-weight:bold;
    font-size:16px;
}

.caption{
    margin-top:5px;
    font-size:14px;
}


.actions button{
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.5);
    color:white;
    font-size:20px;
}

.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#000;
    border-top:1px solid #222;
    padding:10px 0;
}

.navbar a{
    text-decoration:none;
}

.navbar button{
    background:none;
    border:none;
    color:white;
    font-size:18px;
}
</style></head><body><div class="header">
🎬 Snapz Reels
</div>

{% for r in reels %}

<div class="reel">

    <video controls loop>
        <source src="{{ r[2] }}">
    </video>

    <div class="info">
        <div style="display:flex;align-items:center;gap:8px;">
            <span class="username">@{{ r[1] }}</span>

            <button class="follow-btn"
            onclick="toggleFollow(this,'{{ r[1] }}')">
            Follow
            </button>
        </div>

        <div class="caption">
            {{ r[3] }}
        </div>
    </div>

    <div class="actions">

<button
onclick="toggleLike(this, {{ r[0] }})">
❤️
</button>

<div style="
text-align:center;
font-size:12px;
font-weight:bold;
margin-top:-10px;
color:white;">
{{ r[4] }}
</div>


<button onclick="toggleCommentBox('c{{ r[0] }}')">
💬
</button>

<div id="c{{ r[0] }}"
style="display:none;padding:10px;background:#111;">

<form method="POST" action="/reel_comment">

<input type="hidden"
name="reel_id"
value="{{ r[0] }}">

<input
type="text"
name="comment"
placeholder="Add comment..."
required>

<button type="submit">
Post
</button>

</form>

</div>


<button onclick="openShare({{ r[0] }})">
📤
</button>

    </div>

</div>

<div id="c{{ loop.index }}" style="display:none;">
    <input type="text" placeholder="Add comment...">
    <button>Post</button>
</div>

{% endfor %}


<div class="navbar"><a href="/">
<svg xmlns="http://www.w3.org/2000/svg"
     width="28" height="28"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="2.8"
     stroke-linecap="round"
     stroke-linejoin="round">

  <path d="M3 10.5L12 3l9 7.5"/>
  <path d="M5 9.8V20h14V9.8"/>
</svg>
</a><a href="/reels">
<svg xmlns="http://www.w3.org/2000/svg"
     width="28" height="28"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="2.8"
     stroke-linecap="round"
     stroke-linejoin="round">

  <rect x="3" y="3" width="18" height="18" rx="3"/>
  <path d="M3 8h18"/>
  <path d="M8 3l3 5"/>
  <path d="M13 3l3 5"/>
  <path d="M10 10l5 3-5 3z"/>
</svg>
</a><a href="/upload">
<svg xmlns="http://www.w3.org/2000/svg"
     width="28" height="28"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="2.8"
     stroke-linecap="round"
     stroke-linejoin="round">

  <rect x="3" y="3" width="18" height="18" rx="5"/>
  <path d="M12 8v8"/>
  <path d="M8 12h8"/>

</svg>
</a><a href="/users">
<svg xmlns="http://www.w3.org/2000/svg"
     width="28"
     height="28"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="2.8"
     stroke-linecap="round"
     stroke-linejoin="round">

  <path d="M22 2L11 13"/>
  <path d="M22 2L15 22L11 13L2 9L22 2Z"/>

</svg>
</a><a href="/profile">
<svg xmlns="http://www.w3.org/2000/svg"
     width="28"
     height="28"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="2.8"
     stroke-linecap="round"
     stroke-linejoin="round">

  <circle cx="12" cy="8" r="4"/>
  <path d="M5 20c1.8-3.5 4.5-5 7-5s5.2 1.5 7 5"/>

</svg>
</a>

</div>




<script>
function toggleLike(btn,reelId){

fetch("/like_reel/" + reelId,{
method:"POST"
})

.then(r=>r.json())

.then(data=>{

if(data.status=="liked"){

btn.innerHTML="❤️";
btn.style.color="red";

let count =
document.getElementById(
"like-count-" + reelId
);

count.innerText =
parseInt(count.innerText) + 1;

}

});

}
function toggleFollow(btn,username){

if(btn.innerText=="Follow"){
btn.innerText="Following";
btn.style.background="#333";
}else{
btn.innerText="Follow";
btn.style.background="#0095f6";
}

}

function toggleCommentBox(id){

let box=document.getElementById(id);

if(box.style.display=="none"){
box.style.display="block";
}else{
box.style.display="none";
}

}

function openShareModal(){
alert("Share Panel Open");
}


function shareReel(reelId){

let url =
window.location.origin +
"/reel/" +
reelId;

if(navigator.share){

navigator.share({
title:"Snapz Reel",
url:url
});

}else{

navigator.clipboard.writeText(url);

alert("Link Copied!");
}

}

function openShare(reelId){
window.location.href="/share_reel/" + reelId;
}

</script></body>
</html>
