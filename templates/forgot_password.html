<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#000;color:#fff;font-family:sans-serif;text-align:center;padding-top:60px;">

<h2>Forgot Password</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username or Email"
required
style="
width:280px;
padding:12px;
margin:10px;
border-radius:8px;
border:none;">

<br>

<button
type="submit"
style="
width:280px;
padding:12px;
background:#0095f6;
color:white;
border:none;
border-radius:8px;">
Send OTP
</button>

</form>

<br>

<a href="/login" style="color:#0095f6;">
Back to Login
</a>

</body>
</html>
