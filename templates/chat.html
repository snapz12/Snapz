<script>
const chatForm = document.getElementById("chatForm");
const msgInput = document.getElementById("msgInput");

chatForm.addEventListener("submit", async function(e){

    e.preventDefault();

    const message = msgInput.value.trim();

    if(message==="") return;

    const formData = new FormData();
    formData.append("message", message);

    const res = await fetch("/send_message/{{ chat_with }}",{
        method:"POST",
        body:formData
    });

    const data = await res.json();

    if(data.status==="ok"){

        msgInput.value="";

        loadMessages();

    }

});

async function loadMessages(){

    const res = await fetch("/chat_messages/{{ chat_with }}");
    const chats = await res.json();

    const chatBox = document.querySelector(".chat-container");

    chatBox.innerHTML = "";

    chats.forEach(chat=>{

        let wrapper = document.createElement("div");

        wrapper.className =
            chat.sender=="{{ session['username'] }}"
            ? "message-wrapper outgoing"
            : "message-wrapper incoming";

        let tick = "✓ Sent";

        if(chat.is_seen==1){
            tick = "<span style='color:#00ff55;'>✓ Seen</span>";
        }

        let content = "";

if(chat.image){

    content = `
    <img
        class="chat-image"
        src="/static/uploads/${chat.image}"
        onclick="openImage('/static/uploads/${chat.image}')">
    `;

}


else if(chat.video){

content = `
<video
    class="chat-video"
    onclick="openVideo('/static/uploads/${chat.video}')">

    <source src="/static/uploads/${chat.video}" type="video/mp4">

</video>
`;


}
else if(chat.audio){

    content = `
    <audio controls>
        <source src="/static/uploads/${chat.audio}" type="audio/webm">
    </audio>
    `;

}
else{

    content = `
    <div class="bubble">
        ${chat.message}
    </div>
    `;

}

wrapper.innerHTML = `
<div class="message-box" data-id="${chat.id}">
    ${content}

    <div class="meta-info">
        ${chat.time}
        ${tick}
    </div>
</div>
`;

chatBox.appendChild(wrapper);

const msgBox = wrapper.querySelector(".message-box");

let pressTimer = null;

function startPress(e){

    if(chat.sender != "{{ session['username'] }}"){
        return;
    }

    pressTimer = setTimeout(function(){

        selectedMessage = chat.id;

        document.getElementById("deletePopup").style.display = "block";

    },3000);

}

function stopPress(){

    clearTimeout(pressTimer);

}

msgBox.addEventListener("mousedown", startPress);
msgBox.addEventListener("mouseup", stopPress);
msgBox.addEventListener("mouseleave", stopPress);

msgBox.addEventListener("touchstart", startPress,{passive:true});
msgBox.addEventListener("touchend", stopPress);
msgBox.addEventListener("touchcancel", stopPress);



    });

    chatBox.scrollTop = chatBox.scrollHeight;

}



window.onload = function () {
    loadMessages();
};

let selectedMessage = null;

const deleteBtn = document.getElementById("deleteBtn");
if(deleteBtn){
    deleteBtn.onclick = function(){

        fetch("/delete_message/" + selectedMessage,{
            method:"POST"
        })
        .then(r=>r.json())
        .then(()=>{
            document.getElementById("deletePopup").style.display="none";
            loadMessages();
        });

    };
}

const cancelBtn = document.getElementById("cancelBtn");
if(cancelBtn){
    cancelBtn.onclick = function(){
        document.getElementById("deletePopup").style.display="none";
    };
}


const mediaInput = document.getElementById("mediaInput");

mediaInput.addEventListener("change", async function(){

console.log("Media Selected", this.files);

    const files = [...this.files];

    for(const file of files){

        const formData = new FormData();

        formData.append("file", file);

        let url = "";

        if(file.type.startsWith("image/")){

            url = "/send_images/{{ chat_with }}";

        }
        else if(file.type.startsWith("video/")){

            url = "/send_video/{{ chat_with }}";

        }
        else{
            continue;
        }

	console.log(url);

        const res = await fetch(url,{
            method:"POST",
            body:formData
        });

        const data = await res.json();

        console.log(data);

    }

    mediaInput.value = "";

    loadMessages();

});




let currentImage="";

function openImage(src){


    currentImage = src;

    document.getElementById("viewerImage").src = src;

    document.getElementById("imageViewer").style.display = "flex";

}

function closeImage(){

    document.getElementById("imageViewer").style.display="none";

    document.getElementById("viewerImage").src="";

}

function downloadImage(){

    fetch(currentImage)
    .then(res => res.blob())
    .then(blob => {

        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");

        a.href = url;
        a.download = currentImage.split("/").pop();

        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

        URL.revokeObjectURL(url);

    });

}

let currentVideo="";

function openVideo(src){

    const video = document.getElementById("viewerVideo");

    video.src = src;

    document.getElementById("videoViewer").style.display = "flex";

    video.load();
    video.play();

    if(video.requestFullscreen){
        video.requestFullscreen();
    }
}

function closeVideo(){

    const video=document.getElementById("viewerVideo");

    video.pause();

    video.src="";

    document.getElementById("videoViewer").style.display="none";

}

function downloadVideo(){

    fetch(currentVideo)
    .then(r=>r.blob())
    .then(blob=>{

        const url=URL.createObjectURL(blob);

        const a=document.createElement("a");

        a.href=url;

        a.download=currentVideo.split("/").pop();

        a.click();

        URL.revokeObjectURL(url);

    });

}


let mediaRecorder;
let audioChunks = [];
let recording = false;

let timer;
let seconds = 0;

let stream;
let recordedBlob = null;



document.getElementById("micBtn").onclick = async function(){

    // START RECORDING
    if(!recording){

        stream = await navigator.mediaDevices.getUserMedia({
            audio:true
        });


        mediaRecorder = new MediaRecorder(stream);

        audioChunks = [];


        mediaRecorder.ondataavailable = e=>{
            audioChunks.push(e.data);
        };


        mediaRecorder.onstop = function(){

            recordedBlob = new Blob(
                audioChunks,
                {
                    type:"audio/webm"
                }
            );



            // timer wahi rahega
            console.log("Ready to send");


            stream.getTracks().forEach(
                track=>track.stop()
            );

        };


        mediaRecorder.start();

        recording=true;

        seconds=0;


        document.getElementById("recordStatus")
        .style.display="flex";


        timer=setInterval(()=>{

            seconds++;

            let min=Math.floor(seconds/60);
            let sec=seconds%60;


            document.getElementById("recordTime")
            .innerHTML =
            String(min).padStart(2,"0")
            +
            ":"
            +
            String(sec).padStart(2,"0");


        },1000);


        console.log("Recording Start");


    }

    // STOP RECORDING
    else{


        mediaRecorder.stop();

        recording=false;


        clearInterval(timer);


        console.log("Recording Stop - Waiting Send");

        // yaha hide nahi karenge

    }

};



// CANCEL BUTTON

document.getElementById("cancelRecord").onclick=function(){


    if(mediaRecorder){


        if(recording){
            mediaRecorder.stop();
        }


        recordedBlob=null;

        audioChunks=[];


        clearInterval(timer);


        recording=false;


        document.getElementById("recordStatus")
        .style.display="none";


        document.getElementById("recordTime")
        .innerHTML="00:00";


        console.log("Voice Cancel");

    }

};



// SEND BUTTON

document.querySelector(".send-btn").onclick=function(e){

    if(recordedBlob){

        e.preventDefault(); // form submit rokega

        let formData = new FormData();

        formData.append(
            "audio",
            recordedBlob,
            "voice_"+Date.now()+".webm"
        );


        fetch("/send_voice/{{ chat_with }}",{
            method:"POST",
            body:formData
        })

        .then(res=>res.json())

        .then(data=>{

            console.log("Voice Sent",data);


            document.getElementById("recordStatus")
            .style.display="none";


            document.getElementById("recordTime")
            .innerHTML="00:00";


            recordedBlob=null;
 	loadMessages();

        });

    }

};




</script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>


<script>
let callSeconds = 0;
let ringTimeout = null;
let timerInterval = null;
let currentCaller = "";

const socket = io();

socket.on("connect", function(){

    console.log("Socket Connected:", socket.id);

    socket.emit("join", {
        username: "{{ session['username'] }}"
    });

});


function startCall(type){

    if(type==="video"){
        document.getElementById("callingType").innerHTML="Video Call";
    }else{
        document.getElementById("callingType").innerHTML="Voice Call";
    }

    document.getElementById("callPopup").style.display="flex";

    socket.emit("call-user",{
        to:"{{ chat_with }}",
        from:"{{ session['username'] }}",
        type:type
    });


ringTimeout = setTimeout(function(){  
  
    socket.emit("missed-call",{  
  
        from:"{{ session['username'] }}",  
  
        to:"{{ chat_with }}",  
  
        type:type  
  
    });  
  
    cancelCall();  
  
},30000);  
  

socket.on("incoming-call",function(data){

    currentCaller = data.from;

    if(data.type==="video"){
        document.getElementById("incomingCallType").innerHTML="Video Call";
    }else{
        document.getElementById("incomingCallType").innerHTML="Voice Call";
    }

    document.getElementById("incomingCallPopup").style.display="flex";

});


function startTimer(){

    clearInterval(timerInterval);

    callSeconds = 0;

    timerInterval = setInterval(function(){

        callSeconds++;

        const m = String(Math.floor(callSeconds/60)).padStart(2,"0");
        const s = String(callSeconds%60).padStart(2,"0");

        document.getElementById("callTimer").innerHTML = m + ":" + s;

    },1000);

}

function stopTimer(){

    clearInterval(timerInterval);

    document.getElementById("callTimer").innerHTML="00:00";

}



function cancelCall(){

clearTimeout(ringTimeout);

    stopTimer();

    document.getElementById("callPopup").style.display="none";

    socket.emit("end-call",{
        to:"{{ chat_with }}"
    });

}

function rejectCall(){

clearTimeout(ringTimeout);

    stopTimer();

    document.getElementById("incomingCallPopup").style.display="none";

socket.emit("end-call",{
    to: currentCaller
});

}


function acceptCall(){

clearTimeout(ringTimeout);

    document.getElementById("incomingCallPopup").style.display="none";

    document.getElementById("callPopup").style.display="flex";

socket.emit("answer-call",{
    to: currentCaller
});

    startTimer();

}

socket.on("call-answered",function(){

    document.getElementById("callPopup").style.display="flex";

    startTimer();

});

socket.on("call-ended",function(){

    stopTimer();

    document.getElementById("callPopup").style.display="none";
    document.getElementById("incomingCallPopup").style.display="none";

});



</script>



</body>
</html>
