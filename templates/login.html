<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>

body{  
    background:#222;  
    color:white;  
    text-align:center;  
    font-family:Arial;  
    margin:0;
    padding:0;
}  
  
.box{  
    background:#333;  
    width:300px;  
    margin:auto;  
    padding:20px;  
    border-radius:10px;  
    margin-top:100px;  
}  
  
input{  
    width:90%;  
    padding:10px;  
    margin:10px;  
    border:none;
    border-radius:5px;
}  
  
button{  
    padding:10px 20px;  
    background:red;  
    color:white;  
    border:none;  
    cursor:pointer;
}  

button:hover{
    background:orange;
}

@media (max-width: 360px){
    .box{
        width:90%;
        margin-top:60px;
        padding:15px;
    }

    input{
        width:95%;
        padding:8px;
        margin:8px 0;
    }

    button{
        width:95%;
        padding:10px;
    }
}

@media (min-width: 361px) and (max-width: 480px){
    .box{
        width:85%;
        margin-top:70px;
    }

    input{
        width:92%;
    }

    button{
        width:92%;
    }
}

@media (min-width: 481px) and (max-width: 768px){
    .box{
        width:70%;
        margin-top:90px;
    }

    input{
        width:90%;
    }
}

button:hover{
      background: orange;
    }

</style>

</head>

<body>

<div class="box">

<h1>Login</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

<p>
Don't have an account?
<a href="/signup">Sign Up</a>
</p>

<a href="/forgot_password" style="display:block;text-align:center;margin-top:15px;color:#0095f6;text-decoration:none;">
    Forgot Password?
</a>

</body>
</html>
